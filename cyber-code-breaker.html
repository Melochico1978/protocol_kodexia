<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cyber Code Breaker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #05050a;
      overflow: hidden;
    }
    
    /* Padrão de Grade Cyberpunk com Vignette */
    body::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: -2;
    }
    body::after {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, transparent 30%, #05050a 100%);
      z-index: -1;
    }

    .cyber-container {
      display: flex; flex-direction: column; height: 100vh;
      color: #00e5ff; font-family: 'Share Tech Mono', monospace;
      padding: 30px; box-sizing: border-box; position: relative; z-index: 1;
    }

    /* Top Bar - Painel flutuante de informações */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; padding: 15px 30px;
      background: rgba(0, 229, 255, 0.05);
      border-top: 2px solid #00e5ff;
      border-bottom: 1px solid rgba(0, 229, 255, 0.3);
      backdrop-filter: blur(5px);
      clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
      box-shadow: 0 5px 15px rgba(0, 229, 255, 0.1);
    }

    .glitch-title {
      font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900;
      color: #fff; letter-spacing: 2px;
      text-shadow: 3px 3px 0px #ff007f, -3px -3px 0px #00e5ff;
      position: relative;
    }

    .level-info {
      font-family: 'Orbitron', sans-serif; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
    }

    .health-bar-container { display: flex; align-items: center; gap: 15px; }
    .health-bar { 
      width: 250px; height: 18px; background: rgba(0,0,0,0.5); 
      border: 1px solid #ff007f; position: relative;
      clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
    }
    .health-fill { 
      height: 100%; background: linear-gradient(90deg, #ff007f, #ff4d4d); 
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
      box-shadow: 0 0 10px #ff007f;
    }

    .main-content { display: flex; flex-direction: column; flex: 1; gap: 20px; overflow: hidden; }

    /* Glassmorphism e Painéis Angulares - Story Mode Layout */
    .story-panel { flex: 0 0 180px; display: flex; gap: 20px; }
    .oracle-box {
      background: rgba(10, 15, 30, 0.6); backdrop-filter: blur(10px);
      border-left: 3px solid #00e5ff; border-right: 1px solid rgba(0, 229, 255, 0.3);
      padding: 20px 30px; display: flex; flex-direction: row; align-items: center; gap: 40px; flex: 1;
      clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
      box-shadow: inset 0 0 20px rgba(0, 229, 255, 0.05);
    }
    
    .oracle-avatar { text-align: center; flex: 0 0 140px; }
    .oracle-avatar svg { filter: drop-shadow(0 0 8px #00e5ff); transition: transform 0.3s; width: 100%; max-width: 120px; display: block; margin: 0 auto; }
    .oracle-avatar svg:hover { transform: scale(1.05); }
    .oracle-dialog { 
      color: #e0e0e0; line-height: 1.6; font-size: 20px; flex: 1;
      border-top: none; border-left: 1px dashed rgba(0,229,255,0.3); padding-left: 30px; padding-top: 0;
    }
    .typing-cursor { 
      display: inline-block; width: 12px; height: 22px; background: #00e5ff; 
      animation: blink 1s step-end infinite; vertical-align: bottom; margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .game-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
    
    .history-board {
      flex: 1; background: rgba(5, 5, 10, 0.7); backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 0, 127, 0.3); border-top: 3px solid #ff007f;
      padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
    }
    /* Estilizar barra de rolagem */
    .history-board::-webkit-scrollbar { width: 8px; }
    .history-board::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
    .history-board::-webkit-scrollbar-thumb { background: #ff007f; }

    .guess-row { 
      display: flex; align-items: center; gap: 20px; padding: 12px 15px; 
      background: linear-gradient(90deg, rgba(255,0,127,0.1) 0%, transparent 100%);
      border-left: 4px solid #ff007f; transition: background 0.3s;
    }
    .guess-row:hover { background: linear-gradient(90deg, rgba(255,0,127,0.2) 0%, transparent 100%); }
    
    .code-slots { display: flex; gap: 12px; }
    .slot {
      width: 80px; height: 35px; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.8); border: 1px solid #333; color: #fff; 
      font-size: 14px; font-weight: bold; letter-spacing: 1px;
      clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
    }
    
    .slot.interactive { border-color: rgba(0, 229, 255, 0.5); cursor: pointer; transition: all 0.2s; }
    .slot.interactive:hover { background: rgba(0, 229, 255, 0.2); border-color: #00e5ff; }
    .slot.filled { 
      background: rgba(0, 229, 255, 0.1); border-color: #00e5ff; color: #00e5ff; 
      text-shadow: 0 0 5px #00e5ff;
    }
    
    .feedback-pegs { display: flex; gap: 8px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 20px; }
    .peg { width: 14px; height: 14px; border-radius: 50%; background: #222; border: 1px solid #444; }
    .peg.exact { background: #00ff41; border-color: #00ff41; box-shadow: 0 0 8px #00ff41; }
    .peg.partial { background: #ffea00; border-color: #ffea00; box-shadow: 0 0 8px #ffea00; }

    .input-area { 
      background: rgba(10, 15, 30, 0.8); border-top: 3px solid #00e5ff; 
      padding: 25px; box-shadow: 0 -5px 20px rgba(0, 229, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    
    .commands-palette { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
    .cmd-btn {
      background: rgba(0, 229, 255, 0.05); color: #00e5ff; border: 1px solid #00e5ff; 
      padding: 10px 20px; cursor: pointer; font-family: 'Share Tech Mono', monospace; 
      font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .cmd-btn:hover { background: #00e5ff; color: #000; box-shadow: 0 0 15px rgba(0,229,255,0.5); transform: translateY(-2px); }
    
    .action-row { display: flex; justify-content: space-between; align-items: center; }
    
    .submit-btn {
      background: #ff007f; color: #fff; border: none; padding: 12px 30px; 
      font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px;
      cursor: pointer; position: relative; overflow: hidden;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      transition: all 0.3s;
    }
    .submit-btn::before {
      content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }
    .submit-btn:hover::before { left: 100%; }
    .submit-btn:hover { background: #ff1a8c; box-shadow: 0 0 20px rgba(255,0,127,0.6); }
    .submit-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
    .submit-btn:disabled::before { display: none; }

    /* Botão de Abortar */
    .abort-btn {
      background: transparent; color: #ff003c; border: 1px solid #ff003c;
      padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 12px;
      text-transform: uppercase; cursor: pointer; letter-spacing: 1px;
      transition: all 0.3s; margin-top: auto;
    }
    .abort-btn:hover { background: #ff003c; color: #fff; box-shadow: 0 0 15px rgba(255,0,60,0.5); }

    .overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
    }
    .overlay.active { display: flex; animation: fadeIn 0.5s forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .overlay h2 { font-family: 'Orbitron', sans-serif; font-size: 50px; color: #00e5ff; text-shadow: 0 0 30px #00e5ff; margin-bottom: 20px; letter-spacing: 3px; }
    .overlay button {
      background: #00e5ff; color: #000; border: none; padding: 15px 40px;
      font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 18px; 
      cursor: pointer; letter-spacing: 1px;
      clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
      transition: all 0.3s;
    }
    .overlay button:hover { background: #fff; box-shadow: 0 0 25px #00e5ff; }
  </style>
</head>
<body>

<div class="cyber-container">
  <div class="top-bar">
    <div class="glitch-title">CYBER CODE BREAKER</div>
    <div class="level-info" style="font-size: 18px; color: #fff;" id="level-display">NÍVEL 1 - Portão de Entrada</div>
    <div class="health-bar-container">
      <span style="color: #ff003c; font-weight: bold;" id="health-text">JOGADAS RESTANTES: 10 / 10</span>
      <div class="health-bar">
        <div class="health-fill" id="health-fill" style="width: 100%;"></div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="game-panel">
      <div class="history-board" id="history-board"></div>

      <div class="input-area" id="input-area">
        <div style="margin-bottom: 15px; color: #ccc;">SELECIONE OS COMANDOS DISPONÍVEIS PARA MONTAR A SEQUÊNCIA (ARRASTE OU CLIQUE):</div>
        <div class="commands-palette" id="commands-palette"></div>
        <div class="action-row">
          <div class="code-slots" id="current-guess-slots"></div>
          <button class="submit-btn" id="submit-btn" disabled>EXECUTAR BYPASS</button>
        </div>
      </div>
    </div>
    
    <div class="story-panel">
      <div class="oracle-box">
        <div class="oracle-avatar">
          <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="#00ffff" stroke-width="4" fill="none"/>
            <circle cx="50" cy="50" r="10" fill="#00ffff"/>
          </svg>
          <div style="font-size: 16px; margin-top: 10px;">ORACLE v1.0</div>
        </div>
        <div class="oracle-dialog">
          <span id="oracle-msg"></span><span class="typing-cursor" id="typing-cursor"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <h2 id="overlay-title">FIREWALL QUEBRADO</h2>
  <p id="overlay-desc" style="color: #fff; margin-bottom: 30px; font-size: 20px; max-width: 600px; text-align: center;"></p>
  <button id="overlay-btn">AVANÇAR PARA O PRÓXIMO NÓ</button>
</div>

<script>
const allCommands = ['IF', 'LOOP', 'VAR', 'END', 'DATA', 'PRINT', 'FUNCTION', 'RETURN'];
const levels = [
  { id: 1, name: 'Portão de Entrada', len: 4, cmds: allCommands.slice(0, 6), att: 10, i: "Bem-vindo, Decoder. Eu sou o ORACLE. O primeiro firewall é básico. Descubra os 4 comandos de acesso.", s: "O código está correto! Prepare-se para o próximo nó.", f: "Hmph. Mais uma vez errou." },
  { id: 2, name: 'Vigília Digital', len: 4, cmds: allCommands.slice(0, 6), att: 10, i: "Os sensores estão alertas. Use sua intuição, Decoder. O tempo é curto.", s: "Excelente. Acesso liberado.", f: "Detectei uma anomalia na sua cognição." },
  { id: 3, name: 'Labirinto de Dados', len: 4, cmds: allCommands.slice(0, 6), att: 10, i: "Os servidores estão se reorganizando. Fique atento.", s: "Caminho livre.", f: "Você se perdeu no labirinto." },
  { id: 4, name: 'Eco da Matrix', len: 4, cmds: allCommands.slice(0, 6), att: 10, i: "Confie nos seus instintos.", s: "Bom trabalho.", f: "A matrix te devorou." },
  { id: 5, name: 'Olho de Hórus', len: 4, cmds: allCommands, att: 10, i: "A OmniCorp ativou o protocolo. Agora são mais comandos possíveis.", s: "Rastreio evadido.", f: "Eles nos acharam." },
  { id: 6, name: 'Coração de Trevas', len: 4, cmds: allCommands, att: 10, i: "Cuidado com as armadilhas lógicas.", s: "Trevas dissipadas.", f: "Engolido pelo sistema." },
  { id: 7, name: 'Espelho Quebrado', len: 4, cmds: allCommands, att: 10, i: "Eles estão aprendendo com você.", s: "Padrão quebrado.", f: "O sistema espelhou sua falha." },
  { id: 8, name: 'Código Fantasma', len: 4, cmds: allCommands, att: 10, i: "Descubra a ordem antes que se torne um fantasma.", s: "Silenciados.", f: "Bem-vindo ao cemitério digital." },
  { id: 9, name: 'Torre de Babel', len: 5, cmds: allCommands, att: 10, i: "A linguagem caótica. 5 comandos agora.", s: "Torre decodificada.", f: "Você sucumbiu." },
  { id: 10, name: 'Porta do Juízo', len: 5, cmds: allCommands, att: 8, i: "Penúltimo firewall. Apenas 8 tentativas.", s: "Porta aberta.", f: "Você perdeu." },
  { id: 11, name: 'Sala do Trono', len: 5, cmds: allCommands, att: 8, i: "O coração da OmniCorp. Descubra a sequência.", s: "O trono caiu.", f: "Falha total." },
  { id: 12, name: 'Núcleo Central', len: 5, cmds: allCommands, att: 8, i: "Último nível. ACERTE.", s: "Você conseguiu. A verdade será exposta. Você é uma lenda.", f: "Nossas existências foram apagadas. GAME OVER." }
];

let curLvl = 0;
let secret = [];
let guesses = [];
let curGuess = [];
let typeInt = null;
let state = 'PLAYING';

function $(id) { return document.getElementById(id); }

function startLevel() {
  state = 'PLAYING';
  guesses = [];
  const lvl = levels[curLvl];
  curGuess = new Array(lvl.len).fill(null);
  
  $('level-display').innerText = `NÍVEL ${lvl.id} - ${lvl.name}`;
  updateHealth();
  
  secret = [];
  for(let i=0; i<lvl.len; i++) secret.push(lvl.cmds[Math.floor(Math.random() * lvl.cmds.length)]);
  
  renderPalette();
  renderCurrentGuess();
  $('history-board').innerHTML = '';
  typeMsg(lvl.i);
}

function updateHealth() {
  const lvl = levels[curLvl];
  const left = lvl.att - guesses.length;
  $('health-text').innerText = `JOGADAS RESTANTES: ${left} / ${lvl.att}`;
  $('health-fill').style.width = `${(left/lvl.att)*100}%`;
}

function renderPalette() {
  const p = $('commands-palette');
  p.innerHTML = '';
  levels[curLvl].cmds.forEach(cmd => {
    const btn = document.createElement('button');
    btn.className = 'cmd-btn'; btn.innerText = cmd;
    
    // Configuração para permitir arrastar (Drag)
    btn.draggable = true;
    btn.ondragstart = (e) => {
      if(state !== 'PLAYING') { e.preventDefault(); return; }
      e.dataTransfer.setData('text/plain', cmd);
    };

    // Mantém o clique também por conveniência
    btn.onclick = () => {
      if(state !== 'PLAYING') return;
      const idx = curGuess.indexOf(null);
      if(idx !== -1) { curGuess[idx] = cmd; renderCurrentGuess(); }
    };
    p.appendChild(btn);
  });
}

function renderCurrentGuess() {
  const slots = $('current-guess-slots');
  slots.innerHTML = '';
  let allFilled = true;
  curGuess.forEach((cmd, i) => {
    const d = document.createElement('div');
    d.className = 'slot interactive' + (cmd ? ' filled' : '');
    d.innerText = cmd || '_';
    
    // Configuração para soltar (Drop)
    d.ondragover = (e) => {
      if(state !== 'PLAYING') return;
      e.preventDefault(); // Necessário para permitir o drop
      d.style.borderColor = '#ff007f';
      d.style.boxShadow = '0 0 10px #ff007f';
    };
    
    d.ondragleave = (e) => {
      if(state !== 'PLAYING') return;
      d.style.borderColor = '';
      d.style.boxShadow = '';
    };
    
    d.ondrop = (e) => {
      if(state !== 'PLAYING') return;
      e.preventDefault();
      d.style.borderColor = '';
      d.style.boxShadow = '';
      const droppedCmd = e.dataTransfer.getData('text/plain');
      if (droppedCmd) {
        curGuess[i] = droppedCmd;
        renderCurrentGuess();
      }
    };

    d.onclick = () => { if(state==='PLAYING') { curGuess[i] = null; renderCurrentGuess(); } };
    slots.appendChild(d);
    if(!cmd) allFilled = false;
  });
  $('submit-btn').disabled = !allFilled;
}

$('submit-btn').onclick = () => {
  if(state !== 'PLAYING') return;
  const lvl = levels[curLvl];
  
  let ex = 0, pt = 0;
  const g = [...curGuess], s = [...secret];
  for(let i=0; i<lvl.len; i++) { if(g[i]===s[i]){ ex++; g[i]='X'; s[i]='X'; } }
  for(let i=0; i<lvl.len; i++) {
    if(g[i]!=='X') {
      const idx = s.indexOf(g[i]);
      if(idx!==-1) { pt++; s[idx]='X'; }
    }
  }
  
  guesses.push({ c: [...curGuess], e: ex, p: pt });
  renderHistory(curGuess, ex, pt);
  updateHealth();
  
  if(ex === lvl.len) {
    if(curLvl === levels.length-1) showOverlay('GAME_WON', lvl.s);
    else showOverlay('LEVEL_WON', lvl.s);
  } else if (guesses.length >= lvl.att) {
    showOverlay('GAME_OVER', lvl.f);
  } else {
    curGuess = new Array(lvl.len).fill(null);
    renderCurrentGuess();
    
    let dica = "> Falha na decodificação. Tente novamente.";
    if (ex > 0 && pt > 0) {
      dica = "> Interessante. Você encontrou a posição exata de alguns comandos, e outros estão corretos mas no lugar errado. Reorganize-os.";
    } else if (ex > 0) {
      dica = `> Bom. ${ex} comando(s) está perfeitamente alinhado. Mantenha-o aí e troque o resto.`;
    } else if (pt > 0) {
      dica = `> Estou detectando ressonância. ${pt} comando(s) que você usou faz parte da senha, mas em posições incorretas.`;
    } else if (ex === 0 && pt === 0) {
      dica = "> Erro crítico. ABSOLUTAMENTE NENHUM desses comandos faz parte da senha. Esqueça-os.";
    }
    
    typeMsg(dica);
  }
};

function renderHistory(code, ex, pt) {
  const hb = $('history-board');
  const row = document.createElement('div'); row.className = 'guess-row';
  
  const cs = document.createElement('div'); cs.className = 'code-slots';
  code.forEach(c => { const d = document.createElement('div'); d.className = 'slot filled'; d.innerText = c; cs.appendChild(d); });
  row.appendChild(cs);
  
  const fp = document.createElement('div'); fp.className = 'feedback-pegs';
  for(let i=0; i<ex; i++){ const p=document.createElement('div'); p.className='peg exact'; fp.appendChild(p); }
  for(let i=0; i<pt; i++){ const p=document.createElement('div'); p.className='peg partial'; fp.appendChild(p); }
  for(let i=0; i<levels[curLvl].len - ex - pt; i++){ const p=document.createElement('div'); p.className='peg'; fp.appendChild(p); }
  row.appendChild(fp);
  
  hb.appendChild(row);
  hb.scrollTop = hb.scrollHeight;
}

function typeMsg(txt) {
  clearInterval(typeInt);
  $('oracle-msg').innerText = '';
  $('typing-cursor').style.display = 'inline-block';
  let i = 0;
  typeInt = setInterval(() => {
    $('oracle-msg').innerText += txt.charAt(i);
    i++;
    if(i >= txt.length) { clearInterval(typeInt); $('typing-cursor').style.display = 'none'; }
  }, 20);
}

function showOverlay(type, msg) {
  state = type;
  typeMsg(msg);
  setTimeout(() => {
    const o = $('overlay');
    o.className = 'overlay active';
    if(type === 'LEVEL_WON') {
      $('overlay-title').innerText = 'FIREWALL QUEBRADO';
      $('overlay-title').style.color = '#00ff41';
      $('overlay-desc').innerText = `Acesso ao Nível ${curLvl + 2} Concedido.`;
      $('overlay-btn').innerText = 'AVANÇAR';
      $('overlay-btn').onclick = () => { o.className='overlay'; curLvl++; startLevel(); };
    } else if(type === 'GAME_OVER') {
      $('overlay-title').innerText = 'FALHA CRÍTICA';
      $('overlay-title').style.color = '#ff003c';
      $('overlay-desc').innerText = 'O sistema detectou sua presença. Bloqueado.\nA senha correta era: [ ' + secret.join(' | ') + ' ]';
      $('overlay-btn').innerText = 'REINICIAR TENTATIVA';
      $('overlay-btn').style.background = '#ff003c';
      $('overlay-btn').onclick = () => { o.className='overlay'; $('overlay-btn').style.background = '#00ff41'; startLevel(); };
    } else if(type === 'GAME_WON') {
      $('overlay-title').innerText = 'SISTEMA COMPROMETIDO';
      $('overlay-title').style.color = '#00ff41';
      $('overlay-desc').innerText = 'Você destruiu a OmniCorp. O mundo virtual nunca mais será o mesmo.';
      $('overlay-btn').innerText = 'JOGAR NOVAMENTE';
      $('overlay-btn').onclick = () => { o.className='overlay'; curLvl=0; startLevel(); };
    }
  }, 2000);
}

// Inicia
startLevel();
</script>
</body>
</html>
