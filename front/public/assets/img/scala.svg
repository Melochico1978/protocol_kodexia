<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140704" />
      <stop offset="100%" stop-color="#3b170c" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3c00" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="200" fill="url(#bgGrad)" />
  <path d="M 0,20 L 300,20 M 0,40 L 300,40 M 0,60 L 300,60 M 0,80 L 300,80 M 0,100 L 300,100 M 0,120 L 300,120 M 0,140 L 300,140 M 0,160 L 300,160 M 0,180 L 300,180" stroke="#4f2012" stroke-width="0.5" />
  <path d="M 30,0 L 30,200 M 60,0 L 60,200 M 90,0 L 90,200 M 120,0 L 120,200 M 150,0 L 150,200 M 180,0 L 180,200 M 210,0 L 210,200 M 240,0 L 240,200 M 270,0 L 270,200" stroke="#4f2012" stroke-width="0.5" />
  <path d="M 20,20 L 50,50 L 100,50" stroke="#ff3c00" stroke-width="1.5" fill="none" opacity="0.4" />
  <circle cx="20" cy="20" r="3" fill="#ff3c00" opacity="0.8" />
  <g filter="url(#glow)" transform="translate(150, 100)">
    <!-- Stylized stairs representation of Scala -->
    <path d="M -35,25 L -15,25 L -15,5 L 5,5 L 5,-15 L 25,-15 L 25,-35" fill="none" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M -35,25 L -15,25 L -15,5 L 5,5 L 5,-15 L 25,-15 L 25,-35" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <text x="-5" y="-20" font-family="'Courier New', monospace" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle" transform="rotate(-45)">SCALA</text>
  </g>
</svg>
