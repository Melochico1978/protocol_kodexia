<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#f1c40f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="300" height="200" fill="url(#bgGrad)" />
  <path d="M 0,20 L 300,20 M 0,40 L 300,40 M 0,60 L 300,60 M 0,80 L 300,80 M 0,100 L 300,100 M 0,120 L 300,120 M 0,140 L 300,140 M 0,160 L 300,160 M 0,180 L 300,180" stroke="#1e293b" stroke-width="0.5" />
  <path d="M 30,0 L 30,200 M 60,0 L 60,200 M 90,0 L 90,200 M 120,0 L 120,200 M 150,0 L 150,200 M 180,0 L 180,200 M 210,0 L 210,200 M 240,0 L 240,200 M 270,0 L 270,200" stroke="#1e293b" stroke-width="0.5" />
  <path d="M 10,10 L 50,10 L 70,30 L 120,30" stroke="#39ff14" stroke-width="1.5" fill="none" opacity="0.4" />
  <circle cx="120" cy="30" r="3" fill="#39ff14" opacity="0.8" />
  <path d="M 290,190 L 250,190 L 230,170 L 180,170" stroke="#f1c40f" stroke-width="1.5" fill="none" opacity="0.4" />
  <circle cx="180" cy="170" r="3" fill="#f1c40f" opacity="0.8" />
  <g filter="url(#glow)" transform="translate(150, 100)">
    <circle r="45" fill="none" stroke="url(#neonGrad)" stroke-width="4" stroke-dasharray="10, 5, 20, 5" />
    <circle r="30" fill="none" stroke="#39ff14" stroke-width="2" stroke-dasharray="40, 15" />
    <text x="0" y="12" font-family="'Courier New', monospace" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle" letter-spacing="1">NIM</text>
  </g>
</svg>
